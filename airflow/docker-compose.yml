x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:-http://127.0.0.1:8082}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    PROJECT_ROOT: /opt/finsight-ae
  volumes:
    - ../:/opt/finsight-ae
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    container_name: finsight-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: finsight-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Rad \
          --lastname Admin \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: finsight-airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8082:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: finsight-airflow-scheduler
    command: scheduler
    restart: unless-stopped

volumes:
  airflow-postgres-db-volume:
