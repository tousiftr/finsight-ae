name: FinSight dbt Transform

on:
  workflow_dispatch:

  schedule:
    - cron: "0 8,20 * * *"

jobs:
  dbt-transform:
    name: Run dbt transformations
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
      DBT_TARGET: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

            - name: Create dbt profiles.yml
        run: |
          mkdir -p "$DBT_PROFILES_DIR"

          cat > "$DBT_PROFILES_DIR/profiles.yml" <<'EOF'
          finsight_fintech:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "{{ env_var('DBT_PG_HOST') }}"
                user: "{{ env_var('DBT_PG_USER') }}"
                password: "{{ env_var('DBT_PG_PASSWORD') }}"
                port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
                dbname: "{{ env_var('DBT_PG_DATABASE') }}"
                schema: dbt_rad
                sslmode: require
                threads: 4
          EOF

          echo "Created profiles.yml"
          grep -E "^[a-zA-Z_]+:" "$DBT_PROFILES_DIR/profiles.yml"

      - name: Verify dbt profile exists
        run: |
          echo "DBT_PROFILES_DIR=$DBT_PROFILES_DIR"
          ls -la "$DBT_PROFILES_DIR"
          test -f "$DBT_PROFILES_DIR/profiles.yml"

      - name: Check dbt connection
        working-directory: dbt_fintech
        run: dbt debug --target prod

      - name: Install dbt packages
        working-directory: dbt_fintech
        run: dbt deps

      - name: Check source freshness
        working-directory: dbt_fintech
        run: dbt source freshness --target prod

      - name: Run dbt build
        working-directory: dbt_fintech
        run: dbt build --target prod

      - name: Generate dbt docs
        working-directory: dbt_fintech
        run: dbt docs generate --target prod

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_fintech/target/manifest.json
            dbt_fintech/target/run_results.json
            dbt_fintech/target/catalog.json
            dbt_fintech/target/sources.json
