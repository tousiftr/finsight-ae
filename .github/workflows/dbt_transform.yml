name: FinSight dbt Transform

on:
  workflow_dispatch:

jobs:
  dbt-transform:
    name: Check and build dbt staging
    runs-on: ubuntu-latest

    env:
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          pwd
          ls -la
          echo "dbt_fintech:"
          ls -la dbt_fintech

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Show dbt version
        run: dbt --version

      - name: Verify dbt profile file exists
        working-directory: dbt_fintech
        run: |
          pwd
          ls -la
          grep "^profile:" dbt_project.yml
          test -f profiles.yml && echo "profiles.yml found" || exit 1

      - name: Check dbt connection
        working-directory: dbt_fintech
        run: dbt debug --target dev --profiles-dir .

      - name: Parse dbt project
        working-directory: dbt_fintech
        run: dbt parse --target dev --profiles-dir .

      - name: List staging models
        working-directory: dbt_fintech
        run: dbt ls --target dev --profiles-dir . --select path:models/staging

      - name: Build staging models only
        working-directory: dbt_fintech
        run: dbt build --target dev --profiles-dir . --select path:models/staging