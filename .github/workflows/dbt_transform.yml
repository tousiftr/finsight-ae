name: FinSight dbt Transform

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  dbt-transform:
    name: Run full dbt transformation
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_fintech
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Create dbt profiles.yml
        run: |
          mkdir -p "$DBT_PROFILES_DIR"

          cat > "$DBT_PROFILES_DIR/profiles.yml" <<'EOF'
          finsight_fintech:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "{{ env_var('DBT_PG_HOST') }}"
                user: "{{ env_var('DBT_PG_USER') }}"
                password: "{{ env_var('DBT_PG_PASSWORD') }}"
                port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
                dbname: "{{ env_var('DBT_PG_DATABASE') }}"
                schema: dbt_rad
                sslmode: require
                threads: 4
          EOF

          echo "DBT_PROFILES_DIR=$DBT_PROFILES_DIR"
          ls -la "$DBT_PROFILES_DIR"
          echo "Profile names:"
          grep -E "^[a-zA-Z_]+:" "$DBT_PROFILES_DIR/profiles.yml"

      - name: Show dbt version
        run: dbt --version

      - name: Verify dbt project profile name
        working-directory: dbt_fintech
        run: |
          grep "^profile:" dbt_project.yml

      - name: Check dbt connection
        working-directory: dbt_fintech
        run: dbt debug --target dev

      - name: Install dbt packages
        working-directory: dbt_fintech
        run: dbt deps --target dev

      - name: Parse dbt project
        working-directory: dbt_fintech
        run: dbt parse --target dev

      - name: Check source freshness
        working-directory: dbt_fintech
        run: dbt source freshness --profiles-dir .

      - name: List all dbt models
        working-directory: dbt_fintech
        run: dbt ls --target dev --resource-type model

      - name: Build all dbt models
        working-directory: dbt_fintech
        run: dbt build --profiles-dir .

      - name: Generate dbt docs
        working-directory: dbt_fintech
        run: dbt docs generate --target dev

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_fintech/target/manifest.json
            dbt_fintech/target/run_results.json
            dbt_fintech/target/catalog.json
            dbt_fintech/target/sources.json
