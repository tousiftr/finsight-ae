name: FinSight dbt Transform

on:
  workflow_dispatch:

jobs:
  dbt-transform:
    name: Check and build dbt staging
    runs-on: ubuntu-latest

    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Parse Neon database URL for dbt
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse, unquote

          url = os.environ["NEON_DATABASE_URL"]
          parsed = urlparse(url)

          host = parsed.hostname
          port = parsed.port or 5432
          user = unquote(parsed.username or "")
          password = unquote(parsed.password or "")
          database = unquote((parsed.path or "").lstrip("/"))

          if not host or not user or not password or not database:
              raise ValueError("NEON_DATABASE_URL is missing host, user, password, or database")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"DBT_PG_HOST={host}\n")
              f.write(f"DBT_PG_PORT={port}\n")
              f.write(f"DBT_PG_USER={user}\n")
              f.write(f"DBT_PG_PASSWORD={password}\n")
              f.write(f"DBT_PG_DATABASE={database}\n")
          PY

      - name: Show dbt version
        run: dbt --version

      - name: Check dbt connection
        working-directory: dbt_fintech
        run: dbt debug --target dev --profiles-dir .

      - name: Parse dbt project
        working-directory: dbt_fintech
        run: dbt parse --target dev --profiles-dir .

      - name: List staging models
        working-directory: dbt_fintech
        run: dbt ls --target dev --profiles-dir . --select path:models/staging

      - name: Build staging models only
        working-directory: dbt_fintech
        run: dbt build --target dev --profiles-dir . --select path:models/staging