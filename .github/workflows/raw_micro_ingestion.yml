name: FinSight Raw Micro Ingestion

on:
  schedule:
    - cron: "3/10 * * * *"
  workflow_dispatch:

concurrency:
  group: finsight-raw-micro-ingestion
  cancel-in-progress: false

jobs:
  raw_micro_ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL || secrets.S3_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.S3_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.S3_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || secrets.S3_BUCKET_NAME }}
      R2_REGION: auto
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME || secrets.R2_BUCKET_NAME }}
      S3_REGION: auto
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dbt-postgres

      - name: Create dbt profiles.yml
        working-directory: dbt_fintech
        run: |
          cat > profiles.yml <<'EOF'
          finsight_fintech:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "{{ env_var('DBT_PG_HOST') }}"
                user: "{{ env_var('DBT_PG_USER') }}"
                password: "{{ env_var('DBT_PG_PASSWORD') }}"
                port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
                dbname: "{{ env_var('DBT_PG_DATABASE') }}"
                schema: dbt_rad
                sslmode: require
                threads: 4
          EOF

      - name: Set batch variables
        run: |
          BATCH_DT=$(date -u +'%Y-%m-%d')
          BATCH_ID=$(date -u +'%Y%m%d_%H%M')
          RUN_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "BATCH_DT=$BATCH_DT" >> "$GITHUB_ENV"
          echo "BATCH_ID=$BATCH_ID" >> "$GITHUB_ENV"
          echo "RUN_STARTED_AT=$RUN_STARTED_AT" >> "$GITHUB_ENV"
          echo "BATCH_DT=$BATCH_DT"
          echo "BATCH_ID=$BATCH_ID"
          echo "RUN_STARTED_AT=$RUN_STARTED_AT"

      - name: Generate realistic fintech micro-batch
        run: |
          python data_generator/generate_micro_batch.py --dt "$BATCH_DT" --batch-id "$BATCH_ID"

      - name: Upload micro-batch to Cloudflare R2
        run: |
          python scripts/upload_micro_batch_to_r2.py --dt "$BATCH_DT" --batch-id "$BATCH_ID"

      - name: Load full raw batch into Neon
        run: |
          python loaders/load_r2_batch_to_neon.py --dt "$BATCH_DT" --batch-id "$BATCH_ID"

      - name: Verify raw customers
        run: |
          python loaders/verify_raw_customers_loaded.py --batch-id "$BATCH_ID"

      - name: Verify raw accounts and transactions
        run: |
          python loaders/verify_raw_accounts_transactions_loaded.py --batch-id "$BATCH_ID"

      - name: Check raw source freshness
        working-directory: dbt_fintech
        run: dbt source freshness --profiles-dir .

      - name: Build dbt models
        working-directory: dbt_fintech
        run: dbt build --profiles-dir .
