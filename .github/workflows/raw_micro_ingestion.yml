name: FinSight Raw Micro Ingestion

on:
  schedule:
    - cron: "3/10 * * * *"
  workflow_dispatch:

concurrency:
  group: finsight-raw-micro-ingestion
  cancel-in-progress: false

jobs:
  raw_micro_ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      S3_REGION: auto
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set batch variables
        run: |
          BATCH_DT=$(date -u +'%Y-%m-%d')
          BATCH_ID=$(date -u +'%Y%m%d_%H%M')
          RUN_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "BATCH_DT=$BATCH_DT" >> "$GITHUB_ENV"
          echo "BATCH_ID=$BATCH_ID" >> "$GITHUB_ENV"
          echo "RUN_STARTED_AT=$RUN_STARTED_AT" >> "$GITHUB_ENV"
          echo "BATCH_DT=$BATCH_DT"
          echo "BATCH_ID=$BATCH_ID"
          echo "RUN_STARTED_AT=$RUN_STARTED_AT"

      - name: Generate realistic fintech micro-batch
        run: |
          python data_generator/generate_micro_batch.py --dt "$BATCH_DT" --batch-id "$BATCH_ID"

      - name: Upload micro-batch to Cloudflare R2
        run: |
          python scripts/upload_micro_batch_to_r2.py --dt "$BATCH_DT" --batch-id "$BATCH_ID"

      - name: Load customers into Neon raw
        run: |
          python loaders/load_customers_r2_to_neon.py --key "customers/dt=$BATCH_DT/batch_id=$BATCH_ID/customers.jsonl"

      - name: Load accounts into Neon raw
        run: |
          python loaders/load_accounts_r2_to_neon.py --key "accounts/dt=$BATCH_DT/batch_id=$BATCH_ID/accounts.jsonl"

      - name: Load transactions into Neon raw
        run: |
          python loaders/load_transactions_r2_to_neon.py --key "transactions/dt=$BATCH_DT/batch_id=$BATCH_ID/transactions.jsonl"

      - name: Verify raw customers
        run: |
          python loaders/verify_raw_customers_loaded.py --batch-id "$BATCH_ID"

      - name: Verify raw accounts and transactions
        run: |
          python loaders/verify_raw_accounts_transactions_loaded.py --batch-id "$BATCH_ID"
