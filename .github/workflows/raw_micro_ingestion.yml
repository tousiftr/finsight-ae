name: FinSight Raw Micro Ingestion

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

concurrency:
  group: finsight-raw-micro-ingestion
  cancel-in-progress: false

jobs:
  raw_micro_ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      S3_REGION: auto
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate realistic fintech micro-batch
        run: |
          python data_generator/generate_micro_batch.py

      - name: Upload micro-batch to Cloudflare R2
        run: |
          python scripts/upload_micro_batch_to_r2.py

      - name: Load customers into Neon raw
        run: |
          python loaders/load_customers_r2_to_neon.py --latest

      - name: Load accounts into Neon raw
        run: |
          python loaders/load_accounts_r2_to_neon.py --latest

      - name: Load transactions into Neon raw
        run: |
          python loaders/load_transactions_r2_to_neon.py --latest

      - name: Verify raw customers
        run: |
          python loaders/verify_raw_customers_loaded.py

      - name: Verify raw accounts and transactions
        run: |
          python loaders/verify_raw_accounts_transactions_loaded.py
