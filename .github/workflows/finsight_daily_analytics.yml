name: FinSight Manual Marts

on:
  workflow_dispatch:

concurrency:
  group: finsight-manual-marts
  cancel-in-progress: false

jobs:
  manual-marts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.NEON_DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python and pinned dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dbt.txt
          dbt --version
          python - <<'PY'
          import dbt.version
          version = dbt.version.__version__
          print("Installed dbt version:", version)
          if version.startswith("2."):
              raise SystemExit("dbt Core v2 / Fusion is not supported for this Postgres project yet")
          PY

      - name: Create dbt profiles.yml from GitHub Secrets
        working-directory: dbt_fintech
        run: |
          cat > profiles.yml <<'PROFILE'
          finsight_fintech:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "{{ env_var('DBT_PG_HOST') }}"
                user: "{{ env_var('DBT_PG_USER') }}"
                password: "{{ env_var('DBT_PG_PASSWORD') }}"
                port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
                dbname: "{{ env_var('DBT_PG_DATABASE') }}"
                schema: dbt_fs
                sslmode: require
                threads: 4
          PROFILE

      - name: Validate dbt connection
        working-directory: dbt_fintech
        run: dbt debug --profiles-dir .

      - name: Run dbt marts only
        working-directory: dbt_fintech
        run: dbt build --profiles-dir . --select path:models/marts
