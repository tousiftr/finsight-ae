name: finsight_fintech
version: "1.0.0"
config-version: 2

profile: finsight_fintech

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  finsight_fintech:
    staging:
      +materialized: view

    intermediate:
      +materialized: table

    marts:
      +materialized: view
      core:
        +schema: mart_core
      finance:
        +schema: mart_finance
      product:
        +schema: mart_product
      risk:
        +schema: mart_risk
      growth:
        +schema: mart_growth

    mart:
      +materialized: view


seeds:
  finsight_fintech:
    +quote_columns: false
