version: 2

sources:
  - name: raw
    description: Raw data loaded from Cloudflare R2 into Neon Postgres.
    schema: raw

    tables:
      - name: raw_customers
        description: Raw customer records loaded from R2 JSONL files.

        columns:
          - name: dt
            tests:
              - not_null

          - name: batch_id
            tests:
              - not_null

          - name: payload
            tests:
              - not_null

          - name: source_object_key
            tests:
              - not_null

          - name: raw_record_hash
            tests:
              - not_null
              - unique

      - name: raw_accounts
        description: Raw account records loaded from R2 JSONL files.

        columns:
          - name: dt
            tests:
              - not_null

          - name: batch_id
            tests:
              - not_null

          - name: payload
            tests:
              - not_null

          - name: source_object_key
            tests:
              - not_null

          - name: raw_record_hash
            tests:
              - not_null
              - unique

      - name: raw_transactions
        description: Raw transaction records loaded from R2 JSONL files.

        columns:
          - name: dt
            tests:
              - not_null

          - name: batch_id
            tests:
              - not_null

          - name: payload
            tests:
              - not_null

          - name: source_object_key
            tests:
              - not_null

          - name: raw_record_hash
            tests:
              - not_null
              - unique
      - name: raw_product_events
        description: Raw product event records loaded from JSONL files.

        columns:
          - name: dt
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: payload
            tests: [not_null]

      - name: raw_kyc_applications
        description: Raw KYC application records loaded from JSONL files.

        columns:
          - name: dt
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: payload
            tests: [not_null]
