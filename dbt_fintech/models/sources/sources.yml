version: 2

sources:
  - name: raw
    description: Raw data loaded from Cloudflare R2 into Neon Postgres.
    schema: raw
    loaded_at_field: loaded_at
    freshness:
      warn_after:
        count: 15
        period: minute
      error_after:
        count: 20
        period: minute
    tables:
      - name: raw_customers
        description: Raw customer records loaded from R2 JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_accounts
        description: Raw account records loaded from R2 JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_merchants
        description: >-
          Raw merchant records loaded from R2 JSONL files when the merchant
          ingestion table is available. Merchant source tests are intentionally
          omitted so dbt can still build merchant dimensions from transaction
          merchant references in development databases that have not been
          backfilled with raw.raw_merchants yet.

      - name: raw_transactions
        description: Raw transaction records loaded from R2 JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_product_events
        description: Raw product event records loaded from JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_kyc_applications
        description: Raw KYC application records loaded from JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]
