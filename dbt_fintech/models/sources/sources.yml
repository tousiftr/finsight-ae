version: 2

sources:
  - name: raw
    description: Raw data loaded from generated JSONL batches into Neon Postgres.
    schema: raw
    loaded_at_field: loaded_at
    freshness:
      warn_after:
        count: 15
        period: minute
      error_after:
        count: 20
        period: minute
    tables:
      - name: raw_customers
        description: Raw customer records loaded from generated JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_accounts
        description: Raw account records loaded from generated JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_merchants
        description: >-
          Raw merchant records loaded from generated JSONL files. Merchants are a
          slower-changing dimension, so they intentionally have a slower freshness
          SLA than event and transaction sources.
        freshness:
          warn_after:
            count: 12
            period: hour
          error_after:
            count: 24
            period: hour

      - name: raw_transactions
        description: Raw transaction records loaded from generated JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_product_events
        description: Raw product event records loaded from JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: raw_kyc_applications
        description: Raw KYC application records loaded from JSONL files.
        columns:
          - name: payload
            tests: [not_null]
          - name: batch_id
            tests: [not_null]
          - name: dt
            tests: [not_null]
          - name: raw_record_hash
            tests: [not_null]
          - name: source_object_key
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]
