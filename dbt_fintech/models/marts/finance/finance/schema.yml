version: 2

models:
  - name: fct_transactions
    description: Transaction-level finance fact table built from enriched transaction records.

    columns:
      - name: transaction_id
        description: Unique transaction identifier.
        tests:
          - not_null
          - unique

      - name: account_id
        description: Account associated with the transaction.
        tests:
          - not_null

      - name: customer_id
        description: Customer associated with the transaction.
        tests:
          - not_null

      - name: transaction_timestamp
        description: Timestamp when the transaction occurred.
        tests:
          - not_null

      - name: amount
        description: Transaction amount.
        tests:
          - not_null

      - name: currency
        description: Transaction currency.
        tests:
          - not_null

      - name: transaction_status
        description: Status of the transaction.
        tests:
          - not_null

      - name: loaded_at
        description: Raw ingestion timestamp.
        tests:
          - not_null

  - name: mrt_finance_daily_transactions
    description: Daily finance aggregate built from fct_transactions.

    columns:
      - name: transaction_date
        tests:
          - not_null

      - name: currency
        tests:
          - not_null

      - name: transaction_count
        tests:
          - not_null

      - name: total_transaction_amount
        tests:
          - not_null

      - name: transaction_success_rate
        tests:
          - not_null