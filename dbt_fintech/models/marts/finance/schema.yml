version: 2

models:
  - name: fct_transactions
    description: Transaction-level finance fact table built from enriched transaction records.
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: account_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: transaction_timestamp
        tests: [not_null]
      - name: transaction_date
        tests: [not_null]
      - name: amount
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: loaded_at
        tests: [not_null]

  - name: mrt_finance_daily_transactions
    description: Daily finance aggregate by transaction date and currency.
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_transaction_amount
        tests: [not_null]
      - name: transaction_success_rate
        tests: [not_null]

  - name: mrt_finance_daily_kpis
    description: Daily finance KPI aggregate by transaction date.
    columns:
      - name: transaction_date
        tests: [not_null, unique]
      - name: total_transactions
        tests: [not_null]
      - name: gross_transaction_volume
        tests: [not_null]
      - name: transaction_success_rate
        tests: [not_null]
