version: 2

models:
  - name: mrt_rp_core_customer
    description: Core customer reporting mart for profile and KYC attributes used by dashboards and semantic dimensions.
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: mrt_rp_core_account
    description: Core account reporting mart exposing canonical account attributes and lookup labels for semantic dimensions.
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: account_sub_type
        description: Canonical account subtype for mart consumers.
      - name: account_sub_type_label
        description: Human-readable subtype label from account_sub_types seed.
      - name: account_sub_type_group
        description: Subtype group from account_sub_types seed.

  - name: mrt_rp_core_customer_account_summary
    description: Core report view joining customer accounts to enriched transactions at the account-transaction grain.
    columns:
      - name: customer_id
        tests: [not_null]
      - name: account_id
        tests: [not_null]

  - name: mrt_rp_core_dim_customer_current
    description: Current customer dimension candidate for future semantic/cube modeling.
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: mrt_rp_core_dim_customer_history
    description: Historical customer dimension candidate for future semantic/cube modeling.
    columns:
      - name: customer_id
        tests: [not_null]

  - name: mrt_rp_fin_transactions
    description: Finance transaction reporting mart enriched with canonical account subtype and seed labels/groups.
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: account_sub_type
        description: Canonical account subtype for transaction analytics.
      - name: account_sub_type_label
        description: Human-readable subtype label from account_sub_types seed.
      - name: account_sub_type_group
        description: Subtype group from account_sub_types seed.

  - name: mrt_rp_fin_daily_transactions
    description: Finance daily transaction detail projection for reporting consumers.
    columns:
      - name: transaction_id
        tests: [not_null]

  - name: mrt_rp_fin_daily_kpis
    description: Finance daily KPI reporting mart backed by intermediate daily finance metrics.
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: currency
        tests: [not_null]

  - name: mrt_rp_fin_daily_finance_metrics
    description: Finance daily metrics aggregated by transaction date and currency.
    columns:
      - name: transaction_date
        tests: [not_null]

  - name: mrt_rp_fin_fct_daily_transaction_metrics
    description: Finance fact-style daily transaction metrics candidate for semantic/cube measures.
    columns:
      - name: transaction_date
        tests: [not_null]

  - name: mrt_rp_fin_fct_transaction_status_history
    description: Finance fact-style transaction status history from transaction snapshots.
    columns:
      - name: transaction_id
        tests: [not_null]

  - name: mrt_rp_fin_fct_transactions_current
    description: Finance fact-style current transaction view for semantic/cube measures.
    columns:
      - name: transaction_id
        tests: [not_null, unique]

  - name: mrt_rp_fin_merchant_performance
    description: Finance merchant-level reporting mart with transaction volume, success, fee, and recency metrics.
    columns:
      - name: merchant_id
        description: Merchant identifier for the reporting grain.
        tests: [not_null, unique]
      - name: gross_transaction_volume
        description: Sum of transaction amount by merchant.
      - name: fee_revenue
        description: Sum of transaction fee_amount by merchant.

  - name: mrt_rp_prod_activation
    description: Product activation reporting mart by customer.
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: mrt_rp_prod_daily_active_users
    description: Product daily active user reporting mart.
    columns:
      - name: activity_date
        tests: [not_null]

  - name: mrt_rp_prod_fct_daily_product_activity
    description: Product fact-style daily activity metrics candidate for semantic/cube measures.
    columns:
      - name: event_date
        tests: [not_null]

  - name: mrt_rp_grw_signup_funnel
    description: Growth signup funnel reporting mart built from product activation milestones.
    columns:
      - name: signup_date
        tests: [not_null]

  - name: mrt_rp_risk_kyc_risk
    description: Risk KYC application reporting mart by submission date, status, and level.
    columns:
      - name: submitted_date
        tests: [not_null]

  - name: mrt_rp_risk_fct_customer_risk_summary
    description: Risk fact-style customer risk summary candidate for semantic/cube modeling.
    columns:
      - name: customer_id
        tests: [not_null, unique]


  - name: mixpanel_events_export
    description: Product analytics export model that normalizes product and KYC lifecycle milestones into Mixpanel Import API event format.
    columns:
      - name: source_event_id
        description: Source-system event identifier from staged product or KYC records.
      - name: event_name
        description: Normalized product analytics event name supported by Mixpanel export policy.
        tests: [not_null]
      - name: distinct_id
        description: Customer identifier cast to text for Mixpanel distinct_id.
        tests: [not_null]
      - name: event_time
        description: True event timestamp from source domain record.
        tests: [not_null]
      - name: insert_id
        description: Deterministic hash for idempotent Mixpanel imports.
        tests: [not_null, unique]
      - name: event_source
        description: Upstream model name that produced this event.
      - name: event_properties
        description: JSONB map of non-PII event context properties.
