version: 2

models:
  - name: stg_customers
    description: Cleaned customer staging model built from raw.raw_customers.

    columns:
      - name: customer_id
        description: Unique customer identifier from the raw payload.
        tests:
          - not_null
          - unique

      - name: email
        description: Customer email address.
        tests:
          - not_null

      - name: raw_record_hash
        description: Hash of the raw source record.
        tests:
          - not_null
          - unique

      - name: dt
        description: Raw partition date.
        tests:
          - not_null

      - name: batch_id
        description: Raw batch identifier.
        tests:
          - not_null