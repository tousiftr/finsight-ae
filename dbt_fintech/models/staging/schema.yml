version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: kyc_status
        tests:
          - accepted_values:
              values: ['pending', 'approved', 'rejected', 'manual_review']
      - name: signup_channel
        tests:
          - accepted_values:
              values: ['organic', 'paid_search', 'referral', 'partner', 'social']

  - name: stg_accounts
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: account_type
        tests:
          - accepted_values:
              values: ['savings', 'plus', 'investment', 'super', 'salary']
      - name: investment_sub_type
        tests:
          - accepted_values:
              values: ['crypto', 'etf', 'cfd', 'fx']
              config:
                where: "investment_sub_type is not null"

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id
      - name: amount
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'failed', 'declined']
      - name: transaction_type
        tests:
          - accepted_values:
              values: ['card_payment', 'bank_transfer', 'withdrawal', 'deposit']


  - name: stg_product_events
    columns:
      - name: event_id
        tests: [not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: event_name
        tests:
          - accepted_values:
              values: ['app_opened','signup_started','signup_completed','kyc_started','kyc_submitted','kyc_status_viewed','account_created','deposit_started','deposit_completed','transfer_started','transfer_completed','investment_tab_viewed','crypto_buy_clicked','card_screen_viewed']

  - name: stg_kyc_applications
    columns:
      - name: kyc_application_id
        tests: [not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: kyc_status
        tests:
          - accepted_values:
              values: ['pending','approved','rejected','manual_review','expired']
      - name: kyc_level
        tests:
          - accepted_values:
              values: ['basic','standard','enhanced']
