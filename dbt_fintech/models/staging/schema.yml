version: 2

models:
  - name: stg_customers
    description: Staged customers deduped by customer_id using the latest loaded_at, dt, and batch_id ordering.
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: signup_channel
        tests:
          - relationships:
              arguments:
                to: ref('stg_seed_signup_channels')
                field: signup_channel
      - name: kyc_status
        tests:
          - relationships:
              arguments:
                to: ref('stg_seed_kyc_statuses')
                field: kyc_status

  - name: stg_accounts
    description: Staged accounts deduped by account_id. account_sub_type is the canonical analytics subtype; legacy raw investment_sub_type is only used as a fallback when investment account_sub_type is missing. the investment subtype flag is intentionally not used.
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: account_type
        description: Broad account type validated against the account_types seed.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_seed_account_types')
                field: account_type
      - name: account_sub_type
        description: Canonical account subtype for analytics and marts. account_sub_types maps every subtype to exactly one parent account_type.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_seed_account_sub_types')
                field: account_sub_type
      - name: plan_tier
        description: Canonical plan tier, separate from account type and subtype.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_seed_plan_tiers')
                field: plan_tier

  - name: stg_transactions
    description: Staged transactions deduped by transaction_id using the latest loaded_at, dt, and batch_id ordering.
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: account_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: account_id
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: transaction_type
        tests:
          - relationships:
              arguments:
                to: ref('stg_seed_transaction_types')
                field: transaction_type
      - name: status
        tests:
          - relationships:
              arguments:
                to: ref('stg_seed_transaction_statuses')
                field: transaction_status

  - name: stg_product_events
    description: Staged product events deduped by event_id using the latest loaded_at, dt, and batch_id ordering.
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: event_name
        tests:
          - accepted_values:
              arguments:
                values: ['app_opened', 'signup_started', 'signup_completed', 'kyc_started', 'kyc_submitted', 'kyc_status_viewed', 'account_created', 'deposit_started', 'deposit_completed', 'transfer_started', 'transfer_completed', 'investment_tab_viewed', 'crypto_buy_clicked', 'card_screen_viewed']

  - name: stg_kyc_applications
    description: Staged KYC applications deduped by kyc_application_id using the latest loaded_at, dt, and batch_id ordering.
    columns:
      - name: kyc_application_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: kyc_status
        tests:
          - relationships:
              arguments:
                to: ref('stg_seed_kyc_statuses')
                field: kyc_status
      - name: kyc_level
        tests:
          - accepted_values:
              arguments:
                values: ['basic', 'standard', 'enhanced']
